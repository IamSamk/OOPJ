server:
  port: 8084

spring:
  application:
    name: pricing-service
  datasource:
    url: jdbc:postgresql://localhost:5432/pricing_db
    username: ticketing
    password: ticketing
  jpa:
    hibernate:
      ddl-auto: update
    open-in-view: false
  kafka:
    bootstrap-servers: localhost:9092
    consumer:
      group-id: pricing-service
      auto-offset-reset: earliest
      properties:
        spring.json.trusted.packages: "*"
    producer:
      value-serializer: org.springframework.kafka.support.serializer.JsonSerializer
  data:
    redis:
      host: localhost
      port: 6379

services:
  event-service-base-url: http://localhost:8082

security:
  jwt:
    secret: VGhpcy1pcy1hLWRlbW8tc2VjcmV0LWtleS1mb3ItdGlja2V0aW5nLXBsYXRmb3JtLTEyMw==
    issuer: ticket-booking-platform
    expiration-minutes: 120
