server:
  port: 8083

spring:
  application:
    name: booking-service
  datasource:
    url: jdbc:h2:mem:testdb
    driver-class-name: org.h2.Driver
    username: sa
    password: 
  h2:
    console:
      enabled: true
  jpa:
    hibernate:
      ddl-auto: create-drop
    database-platform: org.hibernate.dialect.H2Dialect
    show-sql: false
  kafka:
    bootstrap-servers: localhost:9092
    enabled: false
    listener:
      auto-startup: false
  data:
    redis:
      host: localhost
      port: 6379

services:
  event-service-base-url: http://localhost:8082
  pricing-service-base-url: http://localhost:8084
  payment-service-base-url: http://localhost:8085
  seat-hold-minutes: 15

security:
  jwt:
    secret: VGhpcy1pcy1hLWRlbW8tc2VjcmV0LWtleS1mb3ItdGlja2V0aW5nLXBsYXRmb3JtLTEyMw==
    issuer: ticket-booking-platform
    expiration-minutes: 120
